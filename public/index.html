<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07070f">
<title>Raven</title>
<style>/* Local font fallbacks - no external requests */</style>
<script src="/socket.io/socket.io.js"></script>
<style>
/* ══ TOKENS ════════════════════════════════════════════════ */
:root{
  --bg:#07070f; --s1:#0d0d1a; --s2:#141422; --s3:#1c1c2e; --s4:#24243a;
  --border:rgba(255,255,255,.07); --accent:#00d4aa; --a2:#7c3aed;
  --glow:rgba(0,212,170,.12); --text:#e8e8f2; --t2:#8888a8; --t3:#3e3e58;
  --danger:#ef4444; --green:#22c55e; --warn:#f59e0b;
  --fd: 'Segoe UI', Arial, Helvetica, system-ui, sans-serif; --fb: 'Segoe UI', Arial, Helvetica, system-ui, sans-serif; --sb:290px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--fb);-webkit-font-smoothing:antialiased}
input,textarea,button,select{font-family:var(--fb);color:var(--text)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px}

/* ══ SVG ICON HELPER ══════════════════════════════════════ */
.ico{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}

/* ══ AUTH ═════════════════════════════════════════════════ */
#auth{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:300;background:var(--bg);padding:16px}
.auth-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 10% 15%,rgba(0,212,170,.08),transparent 65%),radial-gradient(ellipse 55% 45% at 90% 85%,rgba(124,58,237,.1),transparent 65%)}
.auth-card{position:relative;width:100%;max-width:390px;background:var(--s1);border:1px solid var(--border);border-radius:22px;padding:32px 26px;box-shadow:0 32px 64px rgba(0,0,0,.8)}
.al{display:flex;align-items:center;gap:10px;margin-bottom:26px}
.al-ic{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--a2));display:flex;align-items:center;justify-content:center}
.al-t{font-family:var(--fd);font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--accent) 30%,#c0c0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.atabs{display:flex;gap:3px;background:var(--s2);border-radius:9px;padding:3px;margin-bottom:18px}
.atab{flex:1;padding:8px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:500;color:var(--t2);border-radius:7px;transition:.2s}
.atab.on{background:var(--s3);color:var(--text)}
.aerr{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5;border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:12px;display:none}
.fl{display:block;font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.fi{width:100%;padding:10px 13px;background:var(--s2);border:1px solid var(--border);border-radius:9px;font-size:13px;outline:none;transition:.2s;margin-bottom:11px}
.fi:focus{border-color:rgba(0,212,170,.4);box-shadow:0 0 0 3px var(--glow)}
.fi::placeholder{color:var(--t3)}
.abtn{width:100%;padding:11px;border:none;cursor:pointer;font-family:var(--fd);font-size:14px;font-weight:700;border-radius:9px;background:linear-gradient(135deg,var(--accent),#00b894);color:#040e0a;transition:.2s}
.abtn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,212,170,.3)}

/* ══ APP SHELL ════════════════════════════════════════════ */
#app{display:none;height:100%;height:100dvh}
#app.on{display:flex}

/* ══ SIDEBAR ══════════════════════════════════════════════ */
.sb{width:var(--sb);flex-shrink:0;background:var(--s1);display:flex;flex-direction:column;height:100%;z-index:10;transition:transform .28s cubic-bezier(.16,1,.3,1)}
.sbh{padding:14px 12px 0;display:flex;align-items:center;gap:8px}
.sb-logo{font-family:var(--fd);font-size:18px;font-weight:800;flex:1;background:linear-gradient(135deg,var(--accent),#b0b0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sbs{padding:10px 10px;position:relative}
.si{width:100%;padding:8px 12px 8px 32px;background:var(--s2);border:1px solid var(--border);border-radius:20px;font-size:12px;outline:none;transition:.2s}
.si:focus{border-color:rgba(0,212,170,.3);box-shadow:0 0 0 3px var(--glow)}
.si::placeholder{color:var(--t3)}
.si-ico{position:absolute;left:21px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.4}
.sdrop{position:absolute;left:10px;right:10px;top:calc(100% - 2px);background:var(--s2);border:1px solid var(--border);border-radius:10px;z-index:99;overflow:hidden;box-shadow:0 14px 28px rgba(0,0,0,.5);display:none;max-height:300px;overflow-y:auto}
.cl{flex:1;overflow-y:auto;padding:0 5px 5px;scrollbar-width:none}.cl::-webkit-scrollbar{display:none}
.ci{display:flex;align-items:center;gap:9px;padding:8px 7px;border-radius:10px;cursor:pointer;transition:.12s;position:relative}
.ci:hover{background:var(--s2)}
.ci.on{background:var(--s3)}
.ci.on::before{display:none}
/* FIX #1: Avatar - purely CSS, no broken image */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',Arial,Helvetica,system-ui,sans-serif;font-weight:700;color:#fff!important;text-transform:uppercase;position:relative;flex-shrink:0;user-select:none;line-height:1;overflow:hidden}
.av.md{width:40px;height:40px;font-size:14px}
.av.sm{width:26px;height:26px;font-size:10px}
.av.lg{width:54px;height:54px;font-size:19px}
.av.xl{width:72px;height:72px;font-size:26px}
/* Fallback color so avatars are never gray */
.av:not([style*="background"]){background:var(--a2)}
/* online dot removed */
.ci-d{flex:1;min-width:0}
.ci-n{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.ci-p{font-size:11px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-m{text-align:right;flex-shrink:0}
.ci-t{font-size:10px;color:var(--t3);margin-bottom:2px;white-space:nowrap}
.bdg{background:var(--accent);color:#040e0a;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;padding:0 4px}
.sbf{padding:9px 10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer;transition:.12s;flex-shrink:0}
.sbf:hover{background:var(--s2)}
.sbf-d{flex:1;min-width:0}
.sbf-n{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sbf-u{font-size:10px;color:var(--accent)}

/* ══ ICON BUTTONS ═════════════════════════════════════════ */
.ib{width:32px;height:32px;background:var(--s2);border:1px solid var(--border);border-radius:8px;cursor:pointer;color:var(--t2);display:flex;align-items:center;justify-content:center;transition:.14s;flex-shrink:0}
.ib:hover{background:var(--s3);color:var(--text)}
.ib:active{transform:scale(.92)}
.ib.ghost{background:none;border:none}

/* ══ CHAT AREA ════════════════════════════════════════════ */
.chat{flex:1;display:flex;flex-direction:column;min-width:0;height:100%;position:relative;overflow:hidden;background:var(--bg)}

/* FIX #5: Beautiful chat background */
.cbg{position:absolute;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.cbg::before{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(0,212,170,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,170,.018) 1px,transparent 1px);
  background-size:36px 36px;
}
.cbg::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(0,212,170,.05),transparent 60%),
             radial-gradient(ellipse 50% 60% at 5% 100%,rgba(124,58,237,.06),transparent 55%),
             radial-gradient(ellipse 40% 50% at 95% 50%,rgba(6,182,212,.04),transparent 55%);
}
/* floating orbs */
.orb{position:absolute;border-radius:50%;filter:blur(60px);pointer-events:none;animation:drift 12s ease-in-out infinite alternate}
.orb1{width:300px;height:300px;background:rgba(0,212,170,.03);top:-80px;left:20%;animation-duration:15s}
.orb2{width:250px;height:250px;background:rgba(124,58,237,.04);bottom:-60px;right:15%;animation-duration:18s;animation-delay:-5s}
@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(20px,15px) scale(1.05)}}

.ce{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;opacity:.35;user-select:none;position:relative;z-index:1}
.ce-ico{width:64px;height:64px;border:1px solid var(--border);border-radius:20px;background:var(--s1);display:flex;align-items:center;justify-content:center}
.ce-t{font-family:var(--fd);font-size:18px;font-weight:700}
.ce-s{font-size:12px;color:var(--t2)}

/* chat header */
.ch{padding:11px 14px;background:rgba(7,7,15,.9);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;position:relative;z-index:5;flex-shrink:0}
.ch-d{flex:1;min-width:0;cursor:pointer}
.ch-n{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-s{font-size:11px;color:var(--t2)}
.typing-t{color:var(--accent);font-style:italic}
.back-b{display:none;padding:0;background:none;border:none;cursor:pointer;color:var(--t2);margin-right:2px}

/* messages */
.msgs{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 13px;display:flex;flex-direction:column;gap:2px;position:relative;z-index:1}
.ddiv{display:flex;align-items:center;gap:8px;margin:10px 0}
.ddiv::before,.ddiv::after{content:'';flex:1;height:1px;background:var(--border)}
.ddiv-t{font-size:10px;color:var(--t3);background:rgba(13,13,26,.9);padding:3px 9px;border-radius:20px;border:1px solid var(--border);white-space:nowrap}

.mrow{display:flex;align-items:flex-end;gap:6px;margin-bottom:1px}
.mrow.own{flex-direction:row-reverse}
.mb{max-width:66%;padding:8px 11px;border-radius:16px 16px 16px 4px;background:var(--s2);font-size:13px;line-height:1.56;word-break:break-word;animation:bI .15s ease;position:relative}
.mrow.own .mb{background:linear-gradient(135deg,#00c49a,#00d4aa);color:#020d09;font-weight:500;border-radius:16px 16px 4px 16px}
.mrow.own .mt{color:rgba(0,0,0,.38)}
.msnd{font-size:10px;font-weight:700;color:var(--accent);margin-bottom:3px}
.mt{font-size:10px;color:var(--t3);margin-top:3px;text-align:right;display:block}
.mav{width:22px;height:22px;flex-shrink:0}
.mav-sp{width:22px;height:22px;flex-shrink:0;visibility:hidden}
@keyframes bI{from{opacity:0;transform:scale(.9) translateY(5px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* media */
.m-img{max-width:240px;max-height:190px;border-radius:10px;cursor:zoom-in;object-fit:cover;display:block}
.m-file{display:flex;align-items:center;gap:8px;text-decoration:none;color:inherit;min-width:150px}
.m-file-n{font-size:12px;font-weight:500;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.m-file-s{font-size:10px;color:var(--t2);margin-top:1px}
.mrow.own .m-file-s{color:rgba(0,0,0,.38)}

/* FIX #4 voice message — Instagram style */
.vm{display:flex;align-items:center;gap:9px;min-width:190px;max-width:240px;padding:2px 0}
.vm-pb{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.14s;color:var(--text)}
.mrow.own .vm-pb{background:rgba(0,0,0,.18);color:#020d09}
.vm-pb:hover{transform:scale(1.08)}
.vm-pb.pl{background:rgba(0,212,170,.2)}
.vm-wave{flex:1;display:flex;align-items:center;gap:1.5px;height:30px;cursor:pointer}
.vm-b{flex:1;border-radius:1.5px;min-width:1.5px;background:rgba(255,255,255,.18);transition:background .08s}
.mrow.own .vm-b{background:rgba(0,0,0,.18)}
.vm-b.f{background:rgba(255,255,255,.65)}
.mrow.own .vm-b.f{background:rgba(0,0,0,.5)}
.vm-d{font-size:10px;color:var(--t2);min-width:28px;text-align:right;flex-shrink:0}
.mrow.own .vm-d{color:rgba(0,0,0,.38)}

/* ══ INPUT AREA ═══════════════════════════════════════════ */
.cin{padding:8px 10px;background:rgba(7,7,15,.9);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-top:1px solid var(--border);position:relative;z-index:5;flex-shrink:0}
@supports(padding:env(safe-area-inset-bottom)){.cin{padding-bottom:calc(8px + env(safe-area-inset-bottom))}}

/* FIX #5: Normal input row */
.in-row{display:flex;align-items:flex-end;gap:6px}
/* small round media buttons */
.mdb{width:32px;height:32px;background:none;border:1.5px solid var(--border);border-radius:50%;cursor:pointer;color:var(--t2);display:flex;align-items:center;justify-content:center;transition:.14s;flex-shrink:0}
.mdb:hover{border-color:var(--accent);color:var(--accent)}
.mdb:active{transform:scale(.9)}
.mdb.rec{border-color:var(--danger);color:var(--danger);animation:rp 1s infinite}
@keyframes rp{0%,100%{opacity:1}50%{opacity:.45}}
.mi{flex:1;padding:8px 13px;background:var(--s2);border:1px solid var(--border);border-radius:20px;font-size:13px;resize:none;outline:none;max-height:100px;line-height:1.5;transition:.2s;scrollbar-width:none}
.mi:focus{border-color:rgba(0,212,170,.35);box-shadow:0 0 0 3px var(--glow)}
.mi::placeholder{color:var(--t3)}
.sb-btn{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),#00b894);border:none;border-radius:50%;cursor:pointer;color:#020d09;display:flex;align-items:center;justify-content:center;transition:.14s;flex-shrink:0}
.sb-btn:hover{transform:scale(1.08);box-shadow:0 4px 14px rgba(0,212,170,.4)}
.sb-btn:active{transform:scale(.93)}

/* FIX #5: Voice recording state — replaces entire input bar */
.rec-mode{display:none;align-items:center;gap:10px}
.rec-mode.on{display:flex}
.in-row.off{display:none}
.rec-timer{font-family:var(--fd);font-size:15px;font-weight:700;color:var(--danger);min-width:48px}
.rec-wave{flex:1;display:flex;align-items:center;justify-content:center;gap:2px;height:32px}
.rec-bar{width:2.5px;border-radius:2px;background:var(--danger);animation:rwav .6s ease-in-out infinite alternate}
.rec-bar:nth-child(1){height:30%;animation-delay:0s}
.rec-bar:nth-child(2){height:60%;animation-delay:.07s}
.rec-bar:nth-child(3){height:90%;animation-delay:.14s}
.rec-bar:nth-child(4){height:70%;animation-delay:.21s}
.rec-bar:nth-child(5){height:95%;animation-delay:.28s}
.rec-bar:nth-child(6){height:55%;animation-delay:.35s}
.rec-bar:nth-child(7){height:80%;animation-delay:.42s}
.rec-bar:nth-child(8){height:40%;animation-delay:.49s}
.rec-bar:nth-child(9){height:70%;animation-delay:.56s}
.rec-bar:nth-child(10){height:30%;animation-delay:.63s}
@keyframes rwav{from{transform:scaleY(1)}to{transform:scaleY(.3)}}
.rec-cancel{font-size:11px;color:var(--t2);cursor:pointer;background:none;border:none;padding:4px 8px;border-radius:6px;transition:.15s}
.rec-cancel:hover{color:var(--danger)}

/* ══ EMOJI PICKER ═════════════════════════════════════════ */
.ep{position:absolute;bottom:calc(100% + 6px);left:10px;background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:10px;box-shadow:0 14px 32px rgba(0,0,0,.6);z-index:20;display:none;width:272px;animation:pu .15s cubic-bezier(.16,1,.3,1)}
.ep.on{display:block}
@keyframes pu{from{opacity:0;transform:scale(.93) translateY(8px)}to{opacity:1;transform:scale(1)}}
.epc{display:flex;gap:2px;margin-bottom:7px;border-bottom:1px solid var(--border);padding-bottom:7px}
.epc-b{flex:1;padding:4px;border:none;background:none;cursor:pointer;font-size:15px;border-radius:6px;transition:.1s;line-height:1}
.epc-b:hover,.epc-b.on{background:var(--s3)}
.epg{display:grid;grid-template-columns:repeat(8,1fr);gap:1px;max-height:140px;overflow-y:auto}
.epg-b{border:none;background:none;cursor:pointer;font-size:17px;padding:3px;border-radius:5px;transition:.1s;line-height:1}
.epg-b:hover{background:var(--s3);transform:scale(1.15)}

/* ══ PROFILE PANEL ════════════════════════════════════════ */
.pp{position:fixed;right:0;top:0;bottom:0;width:272px;background:var(--s1);border-left:1px solid var(--border);z-index:50;transform:translateX(100%);transition:.28s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;overflow-y:auto}
.pp.on{transform:translateX(0)}
.pp-h{padding:16px 13px 0;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-shrink:0}
.pp-ht{font-family:var(--fd);font-weight:700;font-size:14px}
.pp-b{padding:0 13px 20px;display:flex;flex-direction:column;align-items:center;gap:11px}
.pp-n{font-family:var(--fd);font-size:17px;font-weight:700;text-align:center}
.pp-u{font-size:11px;color:var(--accent);text-align:center}
.pp-bio{font-size:12px;color:var(--t2);text-align:center;line-height:1.6;max-width:220px}
.pp-div{width:100%;height:1px;background:var(--border)}
.pp-st{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:6px;font-weight:600;width:100%}
.ppi{width:100%;padding:9px 11px;background:var(--s2);border:1px solid var(--border);border-radius:8px;font-size:12px;outline:none;transition:.2s;margin-bottom:6px}
.ppi:focus{border-color:rgba(0,212,170,.4);box-shadow:0 0 0 3px var(--glow)}
.ppb{width:100%;padding:9px;border:none;cursor:pointer;font-family:var(--fd);font-size:12px;font-weight:700;border-radius:8px;transition:.2s;margin-bottom:5px}
.ppb.sv{background:linear-gradient(135deg,var(--accent),#00b894);color:#040e0a}
.ppb.sv:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(0,212,170,.3)}
.ppb.lo{background:var(--s2);color:var(--danger);border:1px solid rgba(239,68,68,.3)}

/* ══ MODALS ═══════════════════════════════════════════════ */
.ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s;padding:14px}
.ov.on{opacity:1;pointer-events:all}
.md{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:22px;width:100%;max-width:340px;max-height:88dvh;overflow-y:auto;transform:scale(.95);transition:.2s;box-shadow:0 28px 56px rgba(0,0,0,.8)}
.ov.on .md{transform:scale(1)}
.md-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.md-t{font-family:var(--fd);font-size:15px;font-weight:700}
.ur{display:flex;align-items:center;gap:8px;padding:8px 7px;border-radius:9px;cursor:pointer;transition:.12s}
.ur:hover{background:var(--s2)}
.ur-d{flex:1;min-width:0}
.ur-n{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ur-u{font-size:10px;color:var(--t2)}
/* user profile card */
.upc{display:flex;flex-direction:column;align-items:center;gap:9px;padding:4px 0}
.upc-n{font-family:var(--fd);font-size:19px;font-weight:800;text-align:center}
.upc-u{font-size:12px;color:var(--accent)}
.upc-bio{font-size:12px;color:var(--t2);text-align:center;line-height:1.65;max-width:230px}
.upc-j{font-size:10px;color:var(--t3)}
.upc-mb{width:100%;padding:9px;border:none;cursor:pointer;font-family:var(--fd);font-size:12px;font-weight:700;border-radius:8px;background:linear-gradient(135deg,var(--accent),#00b894);color:#040e0a;transition:.2s;margin-top:4px}
.upc-mb:hover{transform:translateY(-1px)}
/* group management */
.gm-member{display:flex;align-items:center;gap:8px;padding:7px;border-radius:8px;background:var(--s2);margin-bottom:5px}
.gm-kick{padding:3px 8px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:var(--danger);border-radius:5px;cursor:pointer;font-size:10px;font-weight:600;margin-left:auto}

/* ══ LIGHTBOX ═════════════════════════════════════════════ */
#lb{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.95);display:none;align-items:center;justify-content:center;cursor:zoom-out}
#lb img{max-width:94vw;max-height:94vh;border-radius:6px;object-fit:contain}

/* ══ TOAST ════════════════════════════════════════════════ */
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-130%);z-index:600;background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:9px 16px;display:flex;align-items:center;gap:7px;box-shadow:0 10px 28px rgba(0,0,0,.5);transition:.28s cubic-bezier(.16,1,.3,1);max-width:88vw}
.toast.on{transform:translateX(-50%) translateY(0)}
.tdot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0}
.ttxt{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ══ MOBILE ═══════════════════════════════════════════════ */
@media(max-width:620px){
  :root{--sb:100vw}
  .sb{position:fixed;inset:0;width:100%}
  .sb.hi{transform:translateX(-100%)}
  .chat{position:fixed;inset:0;transform:translateX(100%)}
  .chat.vi{transform:translateX(0)}
  .back-b{display:flex!important}
  .pp{width:100%}
}
</style>
</head>
<body>

<!-- AUTH ════════════════════════════════════════════════════ -->
<div id="auth">
  <div class="auth-bg"></div>
  <div class="auth-card">
    <div class="al">
      <div class="al-ic">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <div class="al-t">Raven</div>
    </div>
    <div class="atabs">
      <button class="atab on" onclick="setTab('login')">Sign In</button>
      <button class="atab"    onclick="setTab('reg')">Register</button>
    </div>
    <div class="aerr" id="aerr"></div>
    <form onsubmit="doAuth(event)">
      <div id="f-dn" style="display:none"><label class="fl">Display Name</label><input class="fi" id="i-dn" placeholder="Your name" type="text" autocomplete="name"></div>
      <label class="fl">Username</label>
      <input class="fi" id="i-un" placeholder="e.g. cool_user" type="text" required autocomplete="off" autocapitalize="none" spellcheck="false">
      <label class="fl">Password</label>
      <input class="fi" id="i-pw" placeholder="••••••••" type="password" required autocomplete="current-password">
      <button type="submit" class="abtn" id="abtn">Sign In →</button>
    </form>
  </div>
</div>

<!-- APP ═════════════════════════════════════════════════════ -->
<div id="app">
  <!-- SIDEBAR -->
  <div class="sb" id="sb">
    <div class="sbh">
      <span class="sb-logo">Raven</span>
      <div style="display:flex;gap:4px">
        <!-- New Group button -->
        <button class="ib" onclick="openGM()" title="New Group">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </button>
        <!-- New Chat button -->
        <button class="ib" onclick="openNC()" title="New Chat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="12" y1="8" x2="12" y2="14"/><line x1="9" y1="11" x2="15" y2="11"/></svg>
        </button>
        <!-- Settings button -->
        <button class="ib" onclick="openMyPP()" title="Profile">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </button>
      </div>
    </div>
    <div class="sbs" style="position:relative">
      <svg class="si-ico" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="si" id="sbsrch" placeholder="Search users..." autocomplete="off" autocapitalize="none" oninput="sbSearch(this.value)" onblur="setTimeout(()=>hideDrop('sbdrop'),200)">
      <div class="sdrop" id="sbdrop"></div>
    </div>
    <div class="cl" id="cl"><div style="text-align:center;padding:32px 12px;color:var(--t3);font-size:11px">Loading...</div></div>
    <div class="sbf" onclick="openMyPP()">
      <div class="av md" id="my-av" style="background:#7c3aed">?</div>
      <div class="sbf-d"><div class="sbf-n" id="my-n">—</div><div class="sbf-u" id="my-u">@—</div></div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat" id="chat">
    <div class="cbg"><div class="orb orb1"></div><div class="orb orb2"></div></div>
    <div class="ce" id="ce">
      <div class="ce-ico">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div class="ce-t">Raven</div>
      <div class="ce-s">Select a conversation to start</div>
    </div>
    <!-- header -->
    <div class="ch" id="ch" style="display:none">
      <button class="back-b ib ghost" onclick="goBack()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="av md" id="ch-av">?</div>
      <div class="ch-d" onclick="viewChatProf()">
        <div class="ch-n" id="ch-n">—</div>
        <div class="ch-s" id="ch-s">—</div>
      </div>
      <!-- Group manage (only visible for group admin) -->
      <button class="ib" id="grp-manage-btn" style="display:none" onclick="openGroupManage()" title="Manage Group">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      </button>
    </div>
    <!-- messages -->
    <div class="msgs" id="msgs" style="display:none"></div>
    <!-- input -->
    <div class="cin" id="cin" style="display:none">
      <!-- emoji picker -->

        <div class="epc" id="ep-cats"></div>
        <div class="epg" id="ep-grid"></div>
      </div>
      <!-- FIX #5: voice recording mode overlay -->
      <div class="rec-mode" id="rec-mode">
        <button class="mdb" style="border-color:var(--danger);color:var(--danger)" onclick="cancelRec()" title="Cancel">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <div class="rec-wave">
          <div class="rec-bar"></div><div class="rec-bar"></div><div class="rec-bar"></div>
          <div class="rec-bar"></div><div class="rec-bar"></div><div class="rec-bar"></div>
          <div class="rec-bar"></div><div class="rec-bar"></div><div class="rec-bar"></div>
          <div class="rec-bar"></div>
        </div>
        <span class="rec-timer" id="rec-timer">0:00</span>
        <!-- same send button — sends voice -->
        <button class="sb-btn" onclick="stopAndSendRec()" title="Send Voice">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <!-- normal input row -->
      <div class="in-row" id="in-row">
        <!-- emoji -->
        <button class="mdb" id="ep-btn" onclick="toggleEP(event)" title="Emoji">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
        </button>
        <!-- image -->
        <button class="mdb" onclick="pickImg()" title="Image">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </button>
        <input type="file" id="img-in" accept="image/*" style="display:none" onchange="sendImg(this)">
        <!-- file -->
        <button class="mdb" onclick="pickFile()" title="File">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <input type="file" id="file-in" style="display:none" onchange="sendFileMsg(this)">
        <!-- voice — starts recording, transforms input -->
        <button class="mdb" id="rec-btn" onclick="startRec()" title="Voice">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <!-- text area -->
        <textarea class="mi" id="mi" placeholder="Message..." rows="1" oninput="autoH(this);onType()" onkeydown="onKey(event)"></textarea>
        <!-- send -->
        <button class="sb-btn" onclick="sendTxt()" title="Send">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div id="lb" onclick="this.style.display='none'"><img id="lb-img" src=""></div>

<div class="toast" id="toast"><div class="tdot"></div><div class="ttxt" id="ttxt"></div></div>

<script>
/* ══════════════════════════════════════════════════════════════
   EMOJI DATA
══════════════════════════════════════════════════════════════ */
const EM = {
  '😊': '😊😂🤣😍🥰😘😅🤩😎🥳😇🤗😏😒🙄😬😌😔😢😭😤😠😡🤬😈',
  '👍': '👍👎✌️🤞👌🤌👏🙌🤝🫶❤️🧡💛💚💙💜🖤🤍💔',
  '🎉': '🎉🎊🎈🎁🎀🎆✨⭐🌟💫🔥❄️🌈☀️🌙⚡🌊🌸🌺🌻',
  '😀': '😀😃😄😁😆🤓🧐🤨😑😶🤐😷🤒🤕🥴😵🤯😰😱😳🤡👻💀',
  '🐶': '🐶🐱🐭🐹🐰🦊🐻🐼🐨🐯🦁🐮🐷🐸🐙🦋🐝🦄🦅🐬🐳',
  '🍕': '🍕🍔🌮🌯🥗🍜🍣🍩🍪🎂🍰🧁🍫🍬🍭☕🍵🥂🍺',
};
const EP_CATS = Object.keys(EM);
let epCat = EP_CATS[0];
function buildEP() {
  document.getElementById('ep-cats').innerHTML = EP_CATS.map(k=>`<button class="epc-b${k===epCat?' on':''}" onclick="swCat('${k}',event)">${k}</button>`).join('');
  document.getElementById('ep-grid').innerHTML = [...EM[epCat]].map(e=>`<button class="epg-b" onclick="insEm('${e}',event)">${e}</button>`).join('');
}
function swCat(k,ev){ if(ev){ev.stopPropagation();ev.preventDefault();} epCat=k; buildEP(); }
function insEm(e,ev){ if(ev){ev.stopPropagation();} const el=G('mi'); el.value+=e; el.focus(); closeEP(); }
function toggleEP(ev){ ev.stopPropagation(); const ep=G('ep'); if(!ep.classList.contains('on')){buildEP();ep.classList.add('on');}else ep.classList.remove('on'); }
function closeEP(){ G('ep').classList.remove('on'); }
document.addEventListener('click',e=>{ if(!e.target.closest('#ep')&&!e.target.closest('#ep-btn')) closeEP(); });

/* ══════════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════════ */
const BASE = window.location.origin;
let token = localStorage.getItem('rv_tok');
let me=null, socket=null, convId=null, convs=[];
let aTab='login', sT=null;
let recMR=null, recChunks=[], isRec=false, recStart=0, recTick=null;
let gmSelected=[]; // selected users for new group

/* Voice audio store — avoids passing huge base64 in onclick attributes */
const voiceStore = {};
const G = id => document.getElementById(id);

/* ══════════════════════════════════════════════════════════════
   AUTH
══════════════════════════════════════════════════════════════ */
function setTab(t){
  aTab=t;
  document.querySelectorAll('.atab').forEach((el,i)=>el.classList.toggle('on',(i===0)===(t==='login')));
  G('f-dn').style.display = t==='reg'?'block':'none';
  G('abtn').textContent   = t==='login'?'Sign In →':'Create Account →';
  G('aerr').style.display = 'none';
}
async function doAuth(e){
  e.preventDefault();
  const un=G('i-un').value.trim(), pw=G('i-pw').value, dn=G('i-dn').value.trim();
  const err=G('aerr'); err.style.display='none';
  const body = aTab==='login' ? {username:un,password:pw} : {username:un,password:pw,display_name:dn};
  try{
    const r=await fetch(BASE+(aTab==='login'?'/api/login':'/api/register'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Error');
    token=d.token; me=d.user; localStorage.setItem('rv_tok',token); bootApp();
  }catch(ex){ err.textContent=ex.message; err.style.display='block'; }
}
function logout(){
  localStorage.removeItem('rv_tok'); token=null; me=null; convId=null; convs=[];
  socket?.disconnect(); socket=null;
  G('app').classList.remove('on'); G('auth').style.display='flex'; closePP();
}

/* ══════════════════════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════════════════════ */
async function bootApp(){
  if(!token)return;
  try{
    const r=await fetch(BASE+'/api/users/me',{headers:{Authorization:'Bearer '+token}});
    if(!r.ok){localStorage.removeItem('rv_tok');return;}
    me=await r.json();
  }catch{return;}
  G('auth').style.display='none';
  G('app').classList.add('on');
  setMeUI(); initSocket(); loadConvs();
}
function setMeUI(){
  setAv(G('my-av'), me.display_name, me.avatar_color);
  setAv(G('pp-av'), me.display_name, me.avatar_color);
  G('my-n').textContent=me.display_name;
  G('my-u').textContent='@'+me.username;
  G('pp-n').textContent=me.display_name;
  G('pp-u').textContent='@'+me.username;
  G('pp-dn').value=me.display_name;
  G('pp-bio').value=me.bio||'';
}
/* FIX #1: Unified avatar setter — never gray */
function setAv(el, name, color){
  if(!el)return;
  el.style.background = color || '#7c3aed';
  el.textContent = (name||'?')[0].toUpperCase();
}

/* ══════════════════════════════════════════════════════════════
   SOCKET
══════════════════════════════════════════════════════════════ */
function initSocket(){
  socket=io(BASE,{auth:{token}});
  socket.on('connect',()=>console.log('✅ Socket connected'));
  socket.on('connect_error',e=>{ console.error('Socket:',e.message); toast('Connection error'); });

  socket.on('new_message', msg=>{
    bumpConv(msg);
    if(msg.conversation_id===convId){ renderMsg(msg); scrollB(); }
    else if(msg.sender_id!==me.id) toast(msg.display_name+': '+prevTxt(msg));
  });

  socket.on('user_status',({userId,online})=>{
    // FIX #4: update local state from live socket events only
    convs.forEach(c=>{ const m=c.members?.find(u=>u.id===userId); if(m)m.is_online=online; });
    if(convId){ const c=convs.find(c=>c.id===convId); if(c)setHead(c); }
    renderConvs();
  });

  socket.on('user_typing',({userId,isTyping,conversation_id})=>{
    if(conversation_id!==convId||userId===me.id)return;
    const s=G('ch-s');
    if(isTyping) s.innerHTML='<span class="typing-t">typing...</span>';
    else{ const c=convs.find(c=>c.id===convId); if(c)setHead(c); }
  });

  // FIX #2: Listen for new conversations pushed to this user
  socket.on('user_new_conv_'+me.id, async (convData)=>{
    // join the socket room
    socket.emit('join_conv',{ conversation_id:convData.id });
    // refresh conv list
    await loadConvs();
  });

  socket.on('group_updated', async ({type, conversation_id, userId, user, group_name})=>{
    if(type==='member_removed'&&userId===me.id){
      convs=convs.filter(c=>c.id!==conversation_id);
      if(convId===conversation_id){ convId=null; showEmpty(); }
      renderConvs(); toast('You were removed from the group');
    } else { await loadConvs(); }
  });
}

async function loadConvs(){
  try{
    const r=await fetch(BASE+'/api/conversations',{headers:{Authorization:'Bearer '+token}});
    const d=await r.json();
    convs=Array.isArray(d)?d:[];
    renderConvs();
  }catch(e){ console.error('loadConvs:',e); convs=[]; renderConvs(); }
}
function renderConvs(){
  const el=G('cl');
  if(!convs.length){
    el.innerHTML='<div style="text-align:center;padding:32px 10px;color:var(--t3);font-size:11px">No chats yet.<br>Search for users to start!</div>';
    return;
  }
  el.innerHTML=convs.map(c=>{
    const oth=c.is_group?null:c.members?.find(m=>m.id!==me.id);
    const nm  =c.is_group?(c.group_name||'Group'):(oth?.display_name||'?');
    const col =c.is_group?'#7c3aed':(oth?.avatar_color||'#7c3aed');
    const active=c.id===convId;
    const t=c.last_message_time?fmtT(c.last_message_time):'';
    return `<div class="ci${active?' on':''}" onclick="openConv('${c.id}')">
      <div class="av md" style="background:${col}">${(nm||'?')[0].toUpperCase()}</div>
      <div class="ci-d">
        <div class="ci-n">${esc(nm)}</div>
        <div class="ci-p">${esc(c.last_message||'No messages yet')}</div>
      </div>
      <div class="ci-m">
        <div class="ci-t">${t}</div>
        ${c.unread_count>0?`<div class="bdg">${c.unread_count}</div>`:''}
      </div>
    </div>`;
  }).join('');
}
function bumpConv(msg){
  const c=convs.find(c=>c.id===msg.conversation_id);
  if(c){
    c.last_message=prevTxt(msg);
    c.last_message_time=msg.created_at;
    if(msg.sender_id!==me.id&&msg.conversation_id!==convId) c.unread_count=(c.unread_count||0)+1;
    convs=[c,...convs.filter(x=>x.id!==c.id)];
  } else loadConvs();
  renderConvs();
}
function prevTxt(m){
  if(m.type==='image') return'📷 Photo';
  if(m.type==='audio') return'🎤 Voice';
  if(m.type==='file')  return'📎 '+(m.file_name||'File');
  return m.content;
}

/* ══════════════════════════════════════════════════════════════
   RENDER MESSAGE
══════════════════════════════════════════════════════════════ */
function renderMsg(msg){
  const el=G('msgs');
  const own=msg.sender_id===me.id;
  const t=fmtT(msg.created_at,true);
  const c=convs.find(x=>x.id===convId);
  const grp=c?.is_group;
  const letter=(msg.display_name||msg.username||'?')[0].toUpperCase();
  const color=msg.avatar_color||(msg.sender_id===me.id?(me.avatar_color||'#7c3aed'):'#7c3aed');

  const row=document.createElement('div');
  row.className=`mrow${own?' own':''}`;

  const avHtml=own
    ?`<div class="mav-sp"></div>`
    :`<div class="av sm mav" style="background:${color}">${letter}</div>`;

  let content='';
  switch(msg.type){
    case 'image':
      content=`<img class="m-img" src="${msg.content}" alt="Photo" onclick="openLB(this.src)" loading="lazy">`;
      break;
    case 'audio':
      const dur=msg.duration?fmtDur(msg.duration):'—';
      const vid=`v${msg.id.replace(/-/g,'')}`;
      voiceStore[vid]={content:msg.content, mime:msg.voice_mime||null};
      content=`<div class="vm">
        <button class="vm-pb" id="pb${vid}" onclick="vmPlay('${vid}')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
        <div class="vm-wave" id="wv${vid}" onclick="vmSeek(event,'${vid}')">
          ${makeWave()}
        </div>
        <span class="vm-d" id="vd${vid}">${dur}</span>
        <audio id="au${vid}" preload="none"
          onended="vmEnd('${vid}','${dur}')"
          ontimeupdate="vmProg('${vid}')"></audio>
      </div>`;
      break;
    case 'file':
      content=`<a class="m-file" href="${msg.content}" download="${esc(msg.file_name||'file')}" target="_blank">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        <div><div class="m-file-n">${esc(msg.file_name||'File')}</div><div class="m-file-s">${fmtSz(msg.file_size)}</div></div>
      </a>`;
      break;
    default:
      content=esc(msg.content).replace(/\n/g,'<br>');
  }

  row.innerHTML=`${avHtml}
    <div class="mb">
      ${grp&&!own?`<div class="msnd">${esc(msg.display_name||msg.username)}</div>`:''}
      ${content}
      <span class="mt">${t}</span>
    </div>`;
  el.appendChild(row);
}

/* Voice waveform */
function makeWave(){
  return Array.from({length:22},(_,i)=>{
    const h=15+Math.abs(Math.sin(i*0.9+1)*50);
    return `<div class="vm-b" style="height:${h}%"></div>`;
  }).join('');
}
function b64toBlob(dataURI, mimeOverride){
  const commaIdx=dataURI.indexOf(',');
  const header=dataURI.substring(0,commaIdx);
  const b64=dataURI.substring(commaIdx+1);
  // Use mimeOverride if provided (preserves codecs like audio/webm;codecs=opus)
  // Otherwise extract from dataURI header
  const mime=mimeOverride || header.replace('data:','').replace(/;base64$/,'');
  const raw=atob(b64);
  const arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
  return new Blob([arr],{type:mime});
}
function vmPlay(vid){
  const au=G('au'+vid), btn=G('pb'+vid);
  if(!au)return;

  // Already has a working src — toggle play/pause
  if(au._blobReady && au.src){
    document.querySelectorAll('audio').forEach(a=>{
      if(a!==au&&!a.paused){ a.pause(); const ov=a.id.slice(2); const ob=G('pb'+ov); if(ob){ob.innerHTML=`<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;ob.classList.remove('pl');} }
    });
    if(au.paused){
      au.play().catch(e=>console.error('play failed',e));
      btn.innerHTML=`<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
      btn.classList.add('pl');
    }else{
      au.pause();
      btn.innerHTML=`<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
      btn.classList.remove('pl');
    }
    return;
  }

  // First play — decode base64 → blob URL
  const entry=voiceStore[vid];
  if(!entry){ console.error('No voice data for',vid); return; }
  try{
    const blob=b64toBlob(entry.content, entry.mime);
    const url=URL.createObjectURL(blob);
    au.src=url;
  }catch(e){ console.error('Voice decode failed',e); return; }

  // Stop other audio
  document.querySelectorAll('audio').forEach(a=>{
    if(a!==au&&!a.paused){ a.pause(); const ov=a.id.slice(2); const ob=G('pb'+ov); if(ob){ob.innerHTML=`<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;ob.classList.remove('pl');} }
  });

  au.addEventListener('canplay',()=>{
    au._blobReady=true;
    au.play().catch(e=>console.error('play failed',e));
    btn.innerHTML=`<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
    btn.classList.add('pl');
  },{once:true});

  au.addEventListener('error',()=>{
    console.error('Audio error for',vid, au.error);
    toast('Could not play voice message');
    btn.innerHTML=`<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
    btn.classList.remove('pl');
    au._blobReady=false;
    au.src='';
  },{once:true});

  au.load();
}
function vmEnd(vid,origDur){
  const btn=G('pb'+vid); if(btn){btn.innerHTML=`<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;btn.classList.remove('pl');}
  document.querySelectorAll(`#wv${vid} .vm-b`).forEach(b=>b.classList.remove('f'));
  const d=G('vd'+vid); if(d)d.textContent=origDur;
}
function vmProg(vid){
  const au=G('au'+vid); if(!au||!au.duration)return;
  const p=au.currentTime/au.duration;
  const d=G('vd'+vid); if(d)d.textContent=fmtDur(au.currentTime);
  const bars=document.querySelectorAll(`#wv${vid} .vm-b`);
  bars.forEach((b,i)=>b.classList.toggle('f',i/bars.length<=p));
}
function vmSeek(ev,vid){
  const au=G('au'+vid), wv=G('wv'+vid);
  if(!au||!wv)return;
  // Need duration — try to get it
  if(!au.duration){ au.load(); au.addEventListener('loadedmetadata',()=>{ const r=wv.getBoundingClientRect(); au.currentTime=((ev.clientX-r.left)/r.width)*au.duration; },{once:true}); return; }
  const r=wv.getBoundingClientRect();
  au.currentTime=((ev.clientX-r.left)/r.width)*au.duration;
}

/* Voice recording */
async function startRec(){
  if(!convId){toast('Open a conversation first');return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    recChunks=[];
    let mime='';
    // Pick best supported format
    const fmts=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/ogg','audio/mp4'];
    for(const f of fmts){ if(MediaRecorder.isTypeSupported(f)){mime=f;break;} }
    recMR=new MediaRecorder(stream, mime?{mimeType:mime}:{});
    recMR.ondataavailable=e=>{ if(e.data&&e.data.size>0) recChunks.push(e.data); };
    recMR.start(); // NO timeslice — collect as single chunk
    isRec=true; recStart=Date.now();
    G('in-row').classList.add('off');
    G('rec-mode').classList.add('on');
    recTick=setInterval(()=>{ G('rec-timer').textContent=fmtDur(Math.floor((Date.now()-recStart)/1000)); },500);
  }catch(e){ toast('Microphone access denied'); }
}
function cancelRec(){
  if(recMR&&isRec){ try{recMR.stream.getTracks().forEach(t=>t.stop()); recMR.stop();}catch{} }
  clearInterval(recTick); isRec=false; recChunks=[];
  G('in-row').classList.remove('off');
  G('rec-mode').classList.remove('on');
  G('rec-timer').textContent='0:00';
}
function stopAndSendRec(){
  if(!recMR||!isRec)return;
  const duration=Math.round((Date.now()-recStart)/1000);
  const mime=recMR.mimeType||'audio/webm';
  recMR.onstop=()=>{
    const blob=new Blob(recChunks,{type:mime});
    recMR.stream.getTracks().forEach(t=>t.stop());
    toB64(blob,b=>{
      socket.emit('send_message',{conversation_id:convId,content:b,type:'audio',file_name:'voice',file_size:blob.size,duration,voice_mime:mime});
    });
  };
  recMR.stop();
  clearInterval(recTick); isRec=false; recChunks=[];
  G('in-row').classList.remove('off');
  G('rec-mode').classList.remove('on');
  G('rec-timer').textContent='0:00';
}

function hideDrop(id){ G(id).style.display='none'; }

/* ══════════════════════════════════════════════════════════════
   FIX #8: GROUP CHAT
══════════════════════════════════════════════════════════════ */
function openGM(){ gmSelected=[]; G('gm-name').value=''; G('gm-s').value=''; G('gm-r').innerHTML=''; G('gm-sel').innerHTML=''; openOv('gm-ov'); setTimeout(()=>G('gm-name').focus(),100); }
async function gmSearch(q){
  if(q.length<2){G('gm-r').innerHTML='';return;}
  const r=await fetch(BASE+`/api/users/search/${encodeURIComponent(q)}`,{headers:{Authorization:'Bearer '+token}});
  const us=await r.json();
  G('gm-r').innerHTML=us.filter(u=>!gmSelected.find(s=>s.id===u.id)).map(u=>`
    <div class="ur" onclick="gmAdd(${JSON.stringify(u).replace(/"/g,'&quot;')})">
      <div class="av sm" style="background:${u.avatar_color||'#7c3aed'}">${(u.display_name||'?')[0].toUpperCase()}</div>
      <div class="ur-d"><div class="ur-n">${esc(u.display_name)}</div><div class="ur-u">@${esc(u.username)}</div></div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>`).join('');
}
function gmAdd(u){
  if(gmSelected.find(s=>s.id===u.id))return;
  gmSelected.push(u);
  G('gm-r').innerHTML='';
  G('gm-s').value='';
  renderGmSel();
}
function gmRemove(uid){ gmSelected=gmSelected.filter(s=>s.id!==uid); renderGmSel(); }
function renderGmSel(){
  G('gm-sel').innerHTML=gmSelected.map(u=>`
    <div style="display:flex;align-items:center;gap:4px;background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:3px 8px 3px 5px;font-size:11px">
      <div class="av" style="width:18px;height:18px;font-size:8px;background:${u.avatar_color||'#7c3aed'}">${(u.display_name||'?')[0].toUpperCase()}</div>
      ${esc(u.display_name)}
      <span onclick="gmRemove('${u.id}')" style="cursor:pointer;color:var(--t2);margin-left:2px;font-size:12px">✕</span>
    </div>`).join('');
}
async function createGroup(){
  const name=G('gm-name').value.trim();
  if(!name){toast('Group name required');return;}
  if(gmSelected.length===0){toast('Add at least one member');return;}
  const r=await fetch(BASE+'/api/conversations',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({is_group:true,group_name:name,member_ids:gmSelected.map(u=>u.id)})});
  const d=await r.json();
  socket.emit('join_conv',{conversation_id:d.id});
  closeOv('gm-ov');
  await loadConvs();
  openConv(d.id);
  toast('Group created!');
}

/* Group management (admin) */
async function openGroupManage(){
  const c=convs.find(x=>x.id===convId);
  if(!c)return;
  G('grp-nm').value=c.group_name||'';
  renderGrpMembers(c);
  G('grp-add-s').value=''; G('grp-add-r').innerHTML='';
  openOv('grp-ov');
}
function renderGrpMembers(c){
  G('grp-members').innerHTML=(c.members||[]).map(m=>`
    <div class="gm-member">
      <div class="av sm" style="background:${m.avatar_color||'#7c3aed'}">${(m.display_name||'?')[0].toUpperCase()}</div>
      <div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:500">${esc(m.display_name)}</div><div style="font-size:10px;color:var(--t2)">@${esc(m.username)}${m.id===c.admin?' 👑':''}</div></div>
      ${m.id!==me.id&&m.id!==c.admin?`<button class="gm-kick" onclick="kickMember('${m.id}')">Remove</button>`:''}
    </div>`).join('');
}
async function kickMember(uid){
  if(!confirm('Remove this member?'))return;
  const r=await fetch(BASE+`/api/conversations/${convId}/members/${uid}`,{method:'DELETE',headers:{Authorization:'Bearer '+token}});
  if(r.ok){ await loadConvs(); const c=convs.find(x=>x.id===convId); if(c)renderGrpMembers(c); toast('Member removed'); }
  else toast('Failed to remove');
}
async function renameGroup(){
  const nm=G('grp-nm').value.trim();
  if(!nm)return;
  await fetch(BASE+`/api/conversations/${convId}`,{method:'PATCH',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({group_name:nm})});
  await loadConvs();
  const c=convs.find(x=>x.id===convId);
  if(c){ G('ch-n').textContent=nm; }
  toast('Renamed ✓');
}
async function grpAddSearch(q){
  if(q.length<2){G('grp-add-r').innerHTML='';return;}
  const r=await fetch(BASE+`/api/users/search/${encodeURIComponent(q)}`,{headers:{Authorization:'Bearer '+token}});
  const us=await r.json();
  const c=convs.find(x=>x.id===convId);
  const existIds=new Set((c?.members||[]).map(m=>m.id));
  G('grp-add-r').innerHTML=us.filter(u=>!existIds.has(u.id)).map(u=>`
    <div class="ur" onclick="addToGroup('${u.id}')">
      <div class="av sm" style="background:${u.avatar_color||'#7c3aed'}">${(u.display_name||'?')[0].toUpperCase()}</div>
      <div class="ur-d"><div class="ur-n">${esc(u.display_name)}</div><div class="ur-u">@${esc(u.username)}</div></div>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>`).join('');
}
async function addToGroup(uid){
  const r=await fetch(BASE+`/api/conversations/${convId}/members`,{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({user_id:uid})});
  if(r.ok){ await loadConvs(); const c=convs.find(x=>x.id===convId); if(c)renderGrpMembers(c); G('grp-add-s').value=''; G('grp-add-r').innerHTML=''; toast('Member added!'); }
  else{ const d=await r.json(); toast(d.error||'Failed'); }
}

/* ══════════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════════ */
function openOv(id){ G(id).classList.add('on'); }
function closeOv(id){ G(id).classList.remove('on'); }
function openLB(src){ G('lb-img').src=src; G('lb').style.display='flex'; }
function scrollB(){ const el=G('msgs'); el.scrollTop=el.scrollHeight; }
function autoH(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtT(d,full=false){
  if(!d)return'';
  const dt=new Date(d),now=new Date(),diff=Math.floor((now-dt)/86400000);
  if(full)return dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if(diff===0)return dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  if(diff===1)return'Yesterday';
  if(diff<7)return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dt.getDay()];
  return dt.toLocaleDateString([],{month:'short',day:'numeric'});
}
function fmtDur(s){ s=Math.floor(s); return Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60); }
function fmtSz(b){ if(!b)return''; if(b<1024)return b+'B'; if(b<1048576)return(b/1024).toFixed(1)+'KB'; return(b/1048576).toFixed(1)+'MB'; }
let tT; function toast(msg){ const el=G('toast'); G('ttxt').textContent=msg; el.classList.add('on'); clearTimeout(tT); tT=setTimeout(()=>el.classList.remove('on'),3200); }

if(token) bootApp();
